<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #060b16;
            --panel: #0b1220;
            --panel-2: #0e1728;
            --muted: #8b98a7;
            --accent: #6366f1;
            --accent-2: #4f46e5;
            --buy: #22c55e;
            --sell: #ef4444;
        }

        body {
            background: radial-gradient(1200px 600px at 10% -10%, #0e1730 0%, transparent 60%), linear-gradient(180deg, var(--bg), #020712);
        }
    </style>
</head>

<div id="loadingOverlay"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
    <div class="bg-slate-900 px-6 py-4 rounded-2xl flex items-center gap-3 shadow-xl">
        <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        <span class="text-white text-sm">Processing...</span>
    </div>
</div>

<body class="text-slate-200">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center bg-black z-50">
        <div class="bg-slate-900 p-6 rounded-2xl w-[90%] max-w-sm border border-slate-800 shadow-xl">

            <h2 class="text-xl font-semibold mb-5 text-center">Gold Ledger Login</h2>

            <div class="space-y-3">
                <input id="userId" placeholder="User ID"
                    class="w-full p-3 rounded-lg bg-slate-800 outline-none text-base">

                <input id="password" type="password" placeholder="Password"
                    class="w-full p-3 rounded-lg bg-slate-800 outline-none text-base">
            </div>

            <button id="loginBtn" onclick="login()"
                class="w-full mt-4 p-3 rounded-lg text-white text-base flex items-center justify-center gap-2 transition"
                style="background:linear-gradient(90deg,#6366f1,#4f46e5)">

                <span id="loginText">Login</span>

                <!-- Spinner -->
                <svg id="loginSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
                    </path>
                </svg>

            </button>

            <p id="loginError" class="text-red-400 text-sm mt-3 text-center hidden">
                Invalid User ID or Password
            </p>

        </div>
    </div>


    <div class="max-w-5xl mx-auto p-4">
        <h1 class="text-2xl font-semibold text-center mb-5 tracking-wide">Gold Ledger</h1>

        <div class="flex justify-between items-center mb-4">
            <p class="text-sm text-slate-400">
                Logged in as <span id="currentUser" class="text-slate-200"></span>
            </p>

            <button onclick="logout()"
                class="px-3 py-1.5 text-xs rounded-lg border border-red-500/30 text-red-400 hover:bg-red-500/10 transition">
                Logout
            </button>
        </div>

        <!-- TOP BAR -->
        <div class="flex gap-3 mb-3 items-center">
            <div class="flex-1 grid grid-cols-4 gap-2 bg-slate-900/60 p-1 rounded-2xl">
                <button onclick="switchTab('buy')" id="buyTabBtn" class="p-3 rounded-xl text-base">Buy</button>
                <button onclick="switchTab('sell')" id="sellTabBtn" class="p-3 rounded-xl text-base">Sell</button>
                <button onclick="switchTab('settled')" id="settledTabBtn"
                    class="p-3 rounded-xl text-base">Settled</button>
                <button onclick="switchTab('accounts')" id="accountsTabBtn"
                    class="p-3 rounded-xl text-base">Accounts</button>
            </div>
        </div>

        <!-- FILTER + SORT + ADD -->
        <div class="flex gap-2 mb-4 items-center">

            <!-- Account Filter -->
            <select id="accountFilter" onchange="setAccount(this.value)"
                class="hidden bg-slate-800 p-2 rounded-lg text-sm">
            </select>

            <!-- Add Button -->
            <button onclick="toggleForm()" id="addBtn" class="px-4 py-2 rounded-lg text-white text-sm shadow"
                style="background:linear-gradient(90deg,var(--accent),var(--accent-2))">
                + Add
            </button>

            <!-- Sort -->
            <select onchange="setSort(this.value)" class="bg-slate-800 p-2 rounded-lg text-sm ml-auto">
                <option value="name">Sort A-Z</option>
                <option value="time">Sort by Time</option>
            </select>

        </div>

        <!-- OVERLAY FORM -->
        <div id="overlay"
            class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="p-6 rounded-2xl w-[92%] max-w-md shadow-2xl border border-slate-800"
                style="background:var(--panel-2)">
                <h2 class="text-xl font-semibold mb-4">New Transaction</h2>

                <div class="space-y-4">
                    <div class="relative">
                        <input id="name" placeholder="Name" oninput="showNameSuggestions(this.value)"
                            onkeydown="handleNameEnter(event)"
                            class="w-full p-3 text-base rounded bg-slate-800 outline-none">

                        <div id="nameSuggestions"
                            class="absolute left-0 right-0 bg-slate-800 border border-slate-700 rounded-lg mt-1 hidden z-50 max-h-40 overflow-y-auto">
                        </div>
                    </div>
                    <input id="weight" type="number" placeholder="Weight (g)"
                        class="w-full p-3 text-base rounded bg-slate-800 outline-none">
                    <input id="rate" type="number" placeholder="Rate per 10g"
                        class="w-full p-3 text-base rounded bg-slate-800 outline-none">
                </div>

                <div class="flex gap-3 mt-5">
                    <button onclick="addTransaction()" class="flex-1 p-3 text-base rounded-lg text-white"
                        style="background:linear-gradient(90deg,var(--accent),var(--accent-2))">Add</button>
                    <button onclick="toggleForm()" class="flex-1 bg-slate-700 p-3 text-base rounded-lg">Cancel</button>
                </div>
            </div>
        </div>

        <!-- TOTAL -->
        <div class="mb-5 grid grid-cols-2 gap-3" id="totalsSection">
            <div class="p-4 rounded-2xl border border-slate-800" style="background:var(--panel)">
                <p class="text-xs text-slate-400">Total ₹</p>
                <p id="totalValue" class="text-2xl font-bold">₹0</p>
            </div>
            <div class="p-4 rounded-2xl border border-slate-800" style="background:var(--panel)">
                <p class="text-xs text-slate-400">Total Gold</p>
                <p id="goldTotal" class="text-2xl font-bold">0g</p>
            </div>
        </div>

        <div id="selectionBar" class="hidden flex gap-3 mb-4">

            <button onclick="bulkSettleAction()" id="bulkSettleBtn"
                class="flex-1 py-3 rounded-xl bg-green-600 text-white text-base">
                Settle
            </button>

            <button onclick="bulkDelete()" class="flex-1 py-3 rounded-xl bg-red-600 text-white text-base">
                Delete
            </button>

            <button onclick="exitSelection()" class="flex-1 py-3 rounded-xl bg-slate-700 text-white text-base">
                Back
            </button>

        </div>

        <!-- LIST -->
        <div id="list" class="space-y-4"></div>
    </div>

    <script>
        let transactions = [];
        let currentTab = 'buy';
        let sortBy = 'name';
        const LOGIN_API = "https://script.google.com/macros/s/AKfycbxb56hTOIFkjq_m8_xfJ5YtPdZgN3fnCtcuU2fcSgMvm789eFwtHFrkm02epHcAx9MX/exec";
        let selectionMode = false;
        let selectedIds = new Set();
        let suggestionIndex = -1;
        let currentSuggestions = [];

        function showLoading() {
            document.getElementById("loadingOverlay").classList.remove("hidden");
        }

        function hideLoading() {
            document.getElementById("loadingOverlay").classList.add("hidden");
        }

        function getUniqueNames() {
            return [...new Set(transactions.map(t => t.name))];
        }

        function showNameSuggestions(value) {
            let box = document.getElementById("nameSuggestions");

            if (!value) {
                box.classList.add("hidden");
                return;
            }

            let names = getUniqueNames().filter(n =>
                n.toLowerCase().includes(value.toLowerCase())
            );

            currentSuggestions = names;
            suggestionIndex = -1;

            if (names.length === 0) {
                box.classList.add("hidden");
                return;
            }

            box.innerHTML = names.map((n, i) => {
                let regex = new RegExp(`(${value})`, "ig");
                let highlighted = n.replace(regex, `<span class="text-indigo-400">$1</span>`);

                return `
        <div 
            id="suggestion-${i}"
            onclick="selectName('${n}')"
            class="p-2 cursor-pointer text-sm hover:bg-slate-700">
            ${highlighted}
        </div>`;
            }).join("");

            box.classList.remove("hidden");
        }

        function updateHighlight() {
            currentSuggestions.forEach((_, i) => {
                let el = document.getElementById(`suggestion-${i}`);
                if (!el) return;

                if (i === suggestionIndex) {
                    el.classList.add("bg-slate-700");
                } else {
                    el.classList.remove("bg-slate-700");
                }
            });
        }

        function selectName(name) {
            document.getElementById("name").value = name;
            document.getElementById("nameSuggestions").classList.add("hidden");
            document.getElementById("weight").focus();
        }

        function handleNameEnter(e) {
            let box = document.getElementById("nameSuggestions");

            if (box.classList.contains("hidden")) {
                if (e.key === "Enter") {
                    e.preventDefault();
                    document.getElementById("weight").focus();
                }
                return;
            }

            if (e.key === "ArrowDown") {
                e.preventDefault();
                suggestionIndex = (suggestionIndex + 1) % currentSuggestions.length;
                updateHighlight();
            }

            else if (e.key === "ArrowUp") {
                e.preventDefault();
                suggestionIndex =
                    (suggestionIndex - 1 + currentSuggestions.length) % currentSuggestions.length;
                updateHighlight();
            }

            else if (e.key === "Enter") {
                e.preventDefault();

                if (suggestionIndex >= 0) {
                    selectName(currentSuggestions[suggestionIndex]);
                } else if (currentSuggestions.length > 0) {
                    // ✅ Auto-select first suggestion
                    selectName(currentSuggestions[0]);
                } else {
                    document.getElementById("weight").focus();
                }
            }
        }

        document.getElementById("weight").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                document.getElementById("rate").focus();
            }
        });

        document.getElementById("rate").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault();
                addTransaction();
            }
        });

        document.addEventListener("click", function (e) {
            if (!e.target.closest("#name")) {
                document.getElementById("nameSuggestions").classList.add("hidden");
            }
        });

        function toggleForm() {
            let overlay = document.getElementById('overlay');
            overlay.classList.toggle('hidden');

            // ✅ When opening → reset + focus
            if (!overlay.classList.contains('hidden')) {

                // 🔄 Clear fields
                document.getElementById("name").value = "";
                document.getElementById("weight").value = "";
                document.getElementById("rate").value = "";

                // 🔽 Hide suggestions if open
                document.getElementById("nameSuggestions").classList.add("hidden");

                // 🎯 Focus + select
                setTimeout(() => {
                    let nameInput = document.getElementById("name");
                    nameInput.focus();
                    nameInput.select();
                }, 50);
            }
        }

        function switchTab(tab) {
            currentTab = tab;

            document.getElementById('buyTabBtn').className =
                tab === 'buy'
                    ? 'p-3 rounded-xl bg-green-500/20 text-green-400 text-base'
                    : 'p-3 rounded-xl text-slate-400 text-base';

            document.getElementById('sellTabBtn').className =
                tab === 'sell'
                    ? 'p-3 rounded-xl bg-red-500/20 text-red-400 text-base'
                    : 'p-3 rounded-xl text-slate-400 text-base';

            document.getElementById('settledTabBtn').className =
                tab === 'settled'
                    ? 'p-3 rounded-xl bg-indigo-500/20 text-indigo-400 text-base'
                    : 'p-3 rounded-xl text-slate-400 text-base';

            document.getElementById("addBtn").style.display =
                tab === "settled" ? "none" : "block";

            document.getElementById("totalsSection").style.display =
                tab === "settled" ? "none" : "grid";

            document.getElementById("accountFilter").classList.toggle(
                "hidden",
                tab !== "accounts"
            );

            document.getElementById('accountsTabBtn').className =
                tab === 'accounts'
                    ? 'p-3 rounded-xl bg-indigo-500/20 text-indigo-400 text-base'
                    : 'p-3 rounded-xl text-slate-400 text-base';

            document.getElementById("addBtn").style.display =
                tab === "accounts" || tab === "settled" ? "none" : "block";

            selectedAccount = null;
            populateAccounts();
            render();
        }

        function setSort(type) {
            sortBy = type;
            render();
        }

        function handleCardClick(id) {
            if (!selectionMode) {
                selectionMode = true;
                selectedIds.add(id);
            } else {
                if (selectedIds.has(id)) {
                    selectedIds.delete(id);
                } else {
                    selectedIds.add(id);
                }

                if (selectedIds.size === 0) {
                    selectionMode = false;
                }
            }

            render();
        }

        function exitSelection() {
            selectionMode = false;
            selectedIds.clear();
            render();
        }

        function render() {
            let container = document.getElementById('list');
            container.innerHTML = "";

            let total = 0;
            let gold = 0;

            let filtered;

            if (currentTab === 'settled') {
                filtered = transactions.filter(t => t.done);

            } else if (currentTab === 'accounts') {

                if (!selectedAccount) {
                    filtered = [];
                } else {
                    filtered = transactions.filter(t => t.name === selectedAccount);
                }

            } else {
                filtered = transactions.filter(t => t.type === currentTab && !t.done);
            }

            filtered.forEach(t => {
                if (!t.done) {
                    total += t.amount;
                    gold += t.weight;
                }

                let badge = t.type === 'buy' ? '<span class="text-green-400 text-xs">BUY</span>' : '<span class="text-red-400 text-xs">SELL</span>';

                let card = `
<div 
  onclick="handleCardClick(${t.id})"
  class="relative overflow-hidden p-4 rounded-2xl cursor-pointer border border-slate-800 shadow-sm transition-transform duration-300 ${selectedIds.has(t.id) ? 'opacity-50' : ''}" 
  style="background:var(--panel)"
  ontouchstart="startSwipe(event, ${t.id})"
  ontouchmove="moveSwipe(event, ${t.id})"
  ontouchend="endSwipe(${t.id})"
  id="card-${t.id}"
>
  
  <!-- Accent Strip -->
  <div class="absolute left-0 top-0 h-full w-1 ${t.type === 'buy' ? 'bg-green-500' : 'bg-red-500'}"></div>
                
  <!-- TOP ROW -->
  <div class="flex justify-between items-center">
    <div class="flex items-center gap-3">

  <!-- Avatar -->
  <div class="w-10 h-10 flex items-center justify-center text-sm font-bold text-white
    bg-gradient-to-br ${getGradient(t.user)}
    rounded-[12px]">
    ${getInitial(t.user)}
  </div>

  <!-- Name + Date -->
  <div>
    <p class="font-semibold text-lg flex items-center gap-2">
      ${t.name} ${badge}
    </p>
    <p class="text-xs text-slate-400">
      ${new Date(t.date).toLocaleString()}
    </p>
  </div>

</div>

    <div class="flex items-center gap-2">

  <button 
    onclick="event.stopPropagation(); if(!selectionMode) toggle(${t.id})"
    class="px-3 py-1.5 text-xs rounded-lg transition
    ${t.done
                        ? 'border border-yellow-500/30 text-yellow-400 hover:bg-yellow-500/10'
                        : 'border border-green-500/30 text-green-400 hover:bg-green-500/10'}">
    
    ${t.done ? 'Unsettle' : 'Settle'}
  </button>

  <button 
    onclick="event.stopPropagation(); if(!selectionMode) deleteTx(${t.id})"
    class="px-3 py-1.5 text-xs rounded-lg border border-red-500/30 text-red-400 hover:bg-red-500/10 transition">
    Delete
  </button>

</div>
  </div>

  <!-- DATA ROW -->
  <div class="grid grid-cols-3 gap-4 mt-4 text-sm items-end">
    
    <div>
      <p class="text-slate-400 text-xs">Weight</p>
      <p class="text-base font-semibold">${t.weight}g</p>
    </div>

    <div>
      <p class="text-slate-400 text-xs">Rate</p>
      <p class="text-base font-semibold">₹${t.rate}</p>
    </div>

    <div class="text-right">
      <p class="text-slate-400 text-xs">Amount</p>
      <p class="text-xl font-bold">₹${Math.round(t.amount)}</p>
    </div>

  </div>
</div>`;

                container.innerHTML += card;
            });

            document.getElementById('totalValue').innerText = '₹' + Math.round(total);
            document.getElementById('goldTotal').innerText = gold.toFixed(2) + 'g';

            let btn = document.getElementById("bulkSettleBtn");

            if (btn) {
                if (currentTab === "settled") {
                    btn.innerText = "Unsettle";
                    btn.className = "flex-1 py-3 rounded-xl bg-yellow-600 text-white text-base";
                } else {
                    btn.innerText = "Settle";
                    btn.className = "flex-1 py-3 rounded-xl bg-green-600 text-white text-base";
                }
            }

            document.getElementById("selectionBar").classList.toggle(
                "hidden",
                !selectionMode
            );
        }

        switchTab('buy');

        let swipeStartX = 0;
        let currentSwipeId = null;

        function getInitial(name) {
            if (!name) return "?";
            return name.trim()[0].toUpperCase();
        }

        function getGradient(name) {
            const colors = [
                "from-indigo-500 to-purple-500",
                "from-pink-500 to-rose-500",
                "from-green-500 to-emerald-500",
                "from-yellow-500 to-orange-500",
                "from-blue-500 to-cyan-500",
                "from-fuchsia-500 to-pink-500"
            ];

            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }

            return colors[Math.abs(hash) % colors.length];
        }

        function startSwipe(e, id) {
            swipeStartX = e.touches[0].clientX;
            currentSwipeId = id;
        }

        function moveSwipe(e, id) {
            if (currentSwipeId !== id) return;

            let dx = e.touches[0].clientX - swipeStartX;

            if (dx < 0) { // only swipe left
                document.getElementById('card-' + id).style.transform = `translateX(${dx}px)`;
            }
        }

        function endSwipe(id) {
            let card = document.getElementById('card-' + id);
            let transform = card.style.transform;

            let moved = transform.match(/-?\d+/);
            let distance = moved ? parseInt(moved[0]) : 0;

            if (distance < -100) {
                deleteTx(id);
            } else {
                card.style.transform = 'translateX(0)';
            }

            currentSwipeId = null;
        }

        function populateAccounts() {
            let dropdown = document.getElementById("accountFilter");
            dropdown.innerHTML = `<option value="">Select Account</option>`;

            let names = [...new Set(transactions.map(t => t.name))];

            names.forEach(name => {
                let opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                dropdown.appendChild(opt);
            });
        }

        function setAccount(name) {
            selectedAccount = name;
            render();
        }


        async function addTransaction() {
            let name = document.getElementById('name').value;
            let weight = parseFloat(document.getElementById('weight').value);
            let rate = parseFloat(document.getElementById('rate').value);

            if (!name || !weight || !rate) return alert("Fill all fields");

            let amount = (weight / 10) * rate;

            let payload = {
                action: "add",
                date: new Date().toISOString(),
                name,
                type: currentTab,
                weight,
                rate,
                amount: Math.round(amount),
                settled: "No",
                user: localStorage.getItem("userId")
            };
            toggleForm();

            showLoading();
            try {
                let res = await fetch(LOGIN_API, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                let result = await res.json();

                transactions.push({
                    id: result.id,
                    name,
                    weight,
                    rate,
                    amount: Math.round(amount),
                    type: currentTab,
                    done: false,
                    date: payload.date,
                    user: payload.user
                });

                render();

            } catch (err) {
                alert("Error saving data");
            } finally {
                hideLoading(); // ALWAYS runs
            }
        }

        async function toggle(id) {
            let tx = transactions.find(t => t.id === id);
            if (!tx) return;

            tx.done = !tx.done;
            showLoading();
            try {
                await fetch(LOGIN_API, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "settle",
                        id: id,
                        settled: tx.done ? "Yes" : "No"
                    })
                });

                render();

            } catch (err) {
                alert("Error updating");
            } finally {
                hideLoading(); // ALWAYS runs
            }
        }

        async function deleteTx(id) {
            if (!confirm("Delete this transaction?")) return;

            showLoading();
            try {
                await fetch(LOGIN_API, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "delete",
                        id: id
                    })
                });

                transactions = transactions.filter(t => t.id !== id);
                render();

            } catch (err) {
                alert("Error deleting");
            } finally {
                hideLoading(); // ALWAYS runs
            }
        }

        async function loadTransactions() {
            showLoading();
            try {
                let res = await fetch(LOGIN_API);
                let data = await res.json();

                console.log("RAW DATA:", data);

                if (!Array.isArray(data)) {
                    throw new Error("Invalid data format");
                }

                transactions = data.map(r => ({
                    id: Number(r.ID),
                    name: r.Name,
                    weight: Number(r.Weight),
                    rate: Number(r.Rate),
                    amount: Number(r.Amt),
                    type: (r["Buy/Sell"] || "").toLowerCase(),
                    done: (r["Settled"] || "").toLowerCase() === "yes",
                    date: r["Date/Time"],
                    user: r.User
                }));

                render();

            } catch (err) {
                console.error(err);
                alert("Error loading data: " + err.message);
            } finally {
                hideLoading(); // ALWAYS runs
            }
        }

        async function login() {
            let userId = document.getElementById('userId').value.trim();
            let password = document.getElementById('password').value.trim();

            if (!userId || !password) {
                showError("Please fill all fields");
                return;
            }

            // 🔄 Start loading
            let btn = document.getElementById("loginBtn");
            let spinner = document.getElementById("loginSpinner");

            btn.disabled = true;
            btn.classList.add("opacity-60", "cursor-not-allowed");
            spinner.classList.remove("hidden");

            try {
                let res = await fetch(`${LOGIN_API}?action=login&userId=${encodeURIComponent(userId)}&password=${encodeURIComponent(password)}`);
                let data = await res.json();

                if (data.success) {
                    localStorage.setItem("loggedIn", "true");
                    localStorage.setItem("userId", userId);

                    document.getElementById("loginScreen").style.display = "none";
                    document.getElementById("currentUser").innerText = userId;
                    loadTransactions();
                } else {
                    showError("Invalid User ID or Password");
                }

            } catch (err) {
                showError("Server error. Try again.");
            }

            // 🔄 Stop loading
            btn.disabled = false;
            btn.classList.remove("opacity-60", "cursor-not-allowed");
            spinner.classList.add("hidden");
        }

        function showError(msg) {
            let el = document.getElementById("loginError");
            el.innerText = msg;
            el.classList.remove("hidden");
        }

        async function bulkSettleAction() {
            if (selectedIds.size === 0) return;

            let settle = currentTab === "settled" ? false : true;

            showLoading();

            try {
                await fetch(LOGIN_API, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "bulkSettle",
                        ids: Array.from(selectedIds),
                        settled: settle ? "Yes" : "No"
                    })
                });

                transactions.forEach(t => {
                    if (selectedIds.has(t.id)) {
                        t.done = settle;
                    }
                });

                selectionMode = false;
                selectedIds.clear();
                render();

            } catch (err) {
                alert("Error updating");
            } finally {
                hideLoading();
            }
        }

        async function bulkDelete() {
            if (selectedIds.size === 0) return;
            if (!confirm("Delete selected transactions?")) return;

            showLoading();

            try {
                await fetch(LOGIN_API, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "bulkDelete",
                        ids: Array.from(selectedIds)
                    })
                });

                transactions = transactions.filter(t => !selectedIds.has(t.id));

                selectionMode = false;
                selectedIds.clear();
                render();

            } catch (err) {
                alert("Error deleting");
            } finally {
                hideLoading();
            }
        }

        // CHECK LOGIN ON LOAD
        if (localStorage.getItem("loggedIn") === "true") {
            document.getElementById("loginScreen").style.display = "none";

            if (localStorage.getItem("userId")) {
                document.getElementById("currentUser").innerText = localStorage.getItem("userId");
            }

            loadTransactions(); // IMPORTANT
        } else {
            document.getElementById("loginScreen").style.display = "flex";
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

    </script>

</body>

</html>

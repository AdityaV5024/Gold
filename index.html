<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #060b16;
            --panel: #0b1220;
            --panel-2: #0e1728;
            --muted: #8b98a7;
            --accent: #6366f1;
            --accent-2: #4f46e5;
            --buy: #22c55e;
            --sell: #ef4444;
        }

        body {
            background: radial-gradient(1200px 600px at 10% -10%, #0e1730 0%, transparent 60%), linear-gradient(180deg, var(--bg), #020712);
        }
    </style>
</head>

<body class="text-slate-200">

    <div class="max-w-5xl mx-auto p-4">
        <h1 class="text-2xl font-semibold text-center mb-5 tracking-wide">Gold Ledger</h1>

        <!-- TOP BAR -->
        <div class="flex gap-3 mb-3 items-center">
            <div class="flex-1 grid grid-cols-2 gap-2 bg-slate-900/60 p-1 rounded-2xl">
                <button onclick="switchTab('buy')" id="buyTabBtn" class="p-3 rounded-xl text-base">Buy</button>
                <button onclick="switchTab('sell')" id="sellTabBtn" class="p-3 rounded-xl text-base">Sell</button>
            </div>
            <button onclick="toggleForm()" class="px-5 py-3 rounded-xl text-white text-base shadow"
                style="background:linear-gradient(90deg,var(--accent),var(--accent-2))">+ Add</button>
        </div>

        <!-- SORT -->
        <div class="flex justify-end mb-4">
            <select onchange="setSort(this.value)" class="bg-slate-800 p-2 rounded-lg text-sm">
                <option value="time">Sort by Time</option>
                <option value="name">Sort A-Z</option>
            </select>
        </div>

        <!-- OVERLAY FORM -->
        <div id="overlay"
            class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
            <div class="p-6 rounded-2xl w-[92%] max-w-md shadow-2xl border border-slate-800"
                style="background:var(--panel-2)">
                <h2 class="text-xl font-semibold mb-4">New Transaction</h2>

                <div class="space-y-4">
                    <input id="name" placeholder="Name" class="w-full p-3 text-base rounded bg-slate-800 outline-none">
                    <input id="weight" type="number" placeholder="Weight (g)"
                        class="w-full p-3 text-base rounded bg-slate-800 outline-none">
                    <input id="rate" type="number" placeholder="Rate per 10g"
                        class="w-full p-3 text-base rounded bg-slate-800 outline-none">
                </div>

                <div class="flex gap-3 mt-5">
                    <button onclick="addTransaction()" class="flex-1 p-3 text-base rounded-lg text-white"
                        style="background:linear-gradient(90deg,var(--accent),var(--accent-2))">Add</button>
                    <button onclick="toggleForm()" class="flex-1 bg-slate-700 p-3 text-base rounded-lg">Cancel</button>
                </div>
            </div>
        </div>

        <!-- TOTAL -->
        <div class="mb-5 grid grid-cols-2 gap-3">
            <div class="p-4 rounded-2xl border border-slate-800" style="background:var(--panel)">
                <p class="text-xs text-slate-400">Total ₹</p>
                <p id="totalValue" class="text-2xl font-bold">₹0</p>
            </div>
            <div class="p-4 rounded-2xl border border-slate-800" style="background:var(--panel)">
                <p class="text-xs text-slate-400">Total Gold</p>
                <p id="goldTotal" class="text-2xl font-bold">0g</p>
            </div>
        </div>

        <!-- LIST -->
        <div id="list" class="space-y-4"></div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('goldData')) || [];
        let currentTab = 'buy';
        let sortBy = 'time';

        function saveData() {
            localStorage.setItem('goldData', JSON.stringify(transactions));
        }

        function toggleForm() {
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function switchTab(tab) {
            currentTab = tab;

            document.getElementById('buyTabBtn').className = tab === 'buy' ? 'p-3 rounded-xl bg-green-500/20 text-green-400 text-base' : 'p-3 rounded-xl text-slate-400 text-base';
            document.getElementById('sellTabBtn').className = tab === 'sell' ? 'p-3 rounded-xl bg-red-500/20 text-red-400 text-base' : 'p-3 rounded-xl text-slate-400 text-base';

            render();
        }

        function setSort(type) {
            sortBy = type;
            render();
        }

        function addTransaction() {
            let name = document.getElementById('name').value;
            let weight = parseFloat(document.getElementById('weight').value);
            let rate = parseFloat(document.getElementById('rate').value);

            if (!name || !weight || !rate) return alert("Fill all fields");

            let amount = (weight / 10) * rate;

            let obj = {
                id: Date.now(),
                name, weight, rate, amount,
                type: currentTab,
                done: false,
                date: new Date().toLocaleString()
            };

            transactions.push(obj);
            saveData();
            render();
            toggleForm();
        }

        function toggle(id) {
            transactions = transactions.map(t => {
                if (t.id === id) t.done = !t.done;
                return t;
            });
            saveData();
            render();
        }

        function deleteTx(id) {
            if (confirm("Delete this transaction?")) {
                transactions = transactions.filter(t => t.id !== id);
                saveData();
                render();
            }
        }

        function render() {
            let container = document.getElementById('list');
            container.innerHTML = "";

            let total = 0;
            let gold = 0;

            let filtered = transactions.filter(t => t.type === currentTab);

            if (sortBy === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                filtered.sort((a, b) => b.id - a.id);
            }

            filtered.forEach(t => {
                if (!t.done) {
                    total += t.amount;
                    gold += t.weight;
                }

                let badge = t.type === 'buy' ? '<span class="text-green-400 text-xs">BUY</span>' : '<span class="text-red-400 text-xs">SELL</span>';

                let card = `
<div 
  class="relative overflow-hidden p-4 rounded-2xl border border-slate-800 shadow-sm transition-transform duration-300 ${t.done?'opacity-40':''}" 
  style="background:var(--panel)"
  ontouchstart="startSwipe(event, ${t.id})"
  ontouchmove="moveSwipe(event, ${t.id})"
  ontouchend="endSwipe(${t.id})"
  id="card-${t.id}"
>
  
  <!-- Accent Strip -->
  <div class="absolute left-0 top-0 h-full w-1 ${t.type==='buy' ? 'bg-green-500' : 'bg-red-500'}"></div>
                
  <!-- TOP ROW -->
  <div class="flex justify-between items-center">
    <div>
      <p class="font-semibold text-lg flex items-center gap-2">
        ${t.name} ${badge}
      </p>
      <p class="text-xs text-slate-400">${t.date}</p>
    </div>

    <div class="flex items-center gap-3">
      <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggle(${t.id})" class="scale-125 cursor-pointer">
      
      <button onclick="deleteTx(${t.id})"
        class="px-3 py-1.5 text-xs rounded-lg border border-red-500/30 text-red-400 hover:bg-red-500/10 transition">
        Delete
      </button>
    </div>
  </div>

  <!-- DATA ROW -->
  <div class="grid grid-cols-3 gap-4 mt-4 text-sm items-end">
    
    <div>
      <p class="text-slate-400 text-xs">Weight</p>
      <p class="text-base font-semibold">${t.weight}g</p>
    </div>

    <div>
      <p class="text-slate-400 text-xs">Rate</p>
      <p class="text-base font-semibold">₹${t.rate}</p>
    </div>

    <div class="text-right">
      <p class="text-slate-400 text-xs">Amount</p>
      <p class="text-xl font-bold">₹${Math.round(t.amount)}</p>
    </div>

  </div>
</div>`;

                container.innerHTML += card;
            });

            document.getElementById('totalValue').innerText = '₹' + Math.round(total);
            document.getElementById('goldTotal').innerText = gold.toFixed(2) + 'g';
        }

        switchTab('buy');



        let swipeStartX = 0;
let currentSwipeId = null;

function startSwipe(e, id){
  swipeStartX = e.touches[0].clientX;
  currentSwipeId = id;
}

function moveSwipe(e, id){
  if(currentSwipeId !== id) return;

  let dx = e.touches[0].clientX - swipeStartX;

  if(dx < 0){ // only swipe left
    document.getElementById('card-'+id).style.transform = `translateX(${dx}px)`;
  }
}

function endSwipe(id){
  let card = document.getElementById('card-'+id);
  let transform = card.style.transform;
  
  let moved = transform.match(/-?\d+/);
  let distance = moved ? parseInt(moved[0]) : 0;

  if(distance < -100){
    deleteTx(id);
  } else {
    card.style.transform = 'translateX(0)';
  }

  currentSwipeId = null;
}
    </script>

</body>

</html>
